<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi Design - Transforme sua Carreira</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Lumi<span>Design</span></div>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1>Domine o Design Visual e ilumine sua carreira.</h1>
            <p>O curso definitivo para quem quer aprender do zero ao avançado com suporte em tempo real.</p>
            <button class="cta-button">Quero me inscrever agora!</button>
        </div>
    </main>

    <div id="chat-circle" class="chat-circle">
        <span>✨</span>
    </div>

    <div class="chat-container hidden" id="chat-box">
        <div class="chat-header">
            <div class="avatar">✨</div>
            <div>
                <h2>Lumi</h2>
                <span class="status">Online | Tira-dúvidas</span>
            </div>
            <button id="close-chat">×</button>
        </div>
        
        <div id="chat-window" class="chat-window">
            <div class="message bot">Olá! Vi que você está olhando nosso curso. Posso te ajudar com alguma dúvida sobre o conteúdo ou pagamento? 😊</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Pergunte algo...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
